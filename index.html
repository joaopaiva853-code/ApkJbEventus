<script>
// Função para registrar o Service Worker e gerar o Manifest dinamicamente (PWA)
(async function registerPWA() {
  // Cria um Blob para o manifest.json
  const manifestObj = {
    name: "Rumo Gestão",
    short_name: "RumoGestão",
    description: "Sistema de gestão completo para negócios",
    start_url: ".",
    display: "standalone",
    theme_color: "#FF8C00",
    background_color: "#030105",
    icons: [
      {
        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23FF8C00'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white'%3E📊%3C/text%3E%3C/svg%3E",
        sizes: "any",
        type: "image/svg+xml",
        purpose: "any maskable"
      }
    ]
  };
  const manifestBlob = new Blob([JSON.stringify(manifestObj)], {type: "application/json"});
  const manifestURL = URL.createObjectURL(manifestBlob);
  // Atualiza o link do manifest
  let manifestLink = document.querySelector('link[rel="manifest"]');
  if (manifestLink) manifestLink.href = manifestURL;
  else {
    const link = document.createElement('link');
    link.rel = "manifest";
    link.href = manifestURL;
    document.head.appendChild(link);
  }

  // Service Worker
  const swCode = `const CACHE_NAME = "rumo-gestao-v1";
const urlsToCache = [
  "./",
  "./index.html"
];
self.addEventListener("install", event => {
  event.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache)));
});
self.addEventListener("fetch", event => {
  event.respondWith(
    caches.match(event.request).then(response => response || fetch(event.request))
  );
});
self.addEventListener("activate", event => {
  event.waitUntil(caches.keys().then(keys => Promise.all(keys.map(key => { if(key !== CACHE_NAME) return caches.delete(key); }))));
});`;
  const swBlob = new Blob([swCode], {type: "application/javascript"});
  const swURL = URL.createObjectURL(swBlob);
  if ('serviceWorker' in navigator) {
    try {
      const registration = await navigator.serviceWorker.register(swURL);
      console.log("Service Worker registered", registration);
    } catch (err) {
      console.error("SW registration failed", err);
    }
  }

  // Exibir banner de instalação (opcional)
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const banner = document.getElementById('installBanner');
    if (banner) banner.classList.remove('hidden');
    const installBtn = document.getElementById('installAppBtn');
    if (installBtn) installBtn.onclick = () => {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => { banner.classList.add('hidden'); });
    };
    const closeBanner = document.getElementById('closeInstallBanner');
    if (closeBanner) closeBanner.onclick = () => banner.classList.add('hidden');
  });
})();
</script>

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  return audioCtx;
}
function playExternalAlarm() {
  try {
    const ctx = initAudio();
    const now = ctx.currentTime;
    const gainNode = ctx.createGain();
    gainNode.gain.value = 0.4;
    gainNode.connect(ctx.destination);
    const freqs = [880, 1046.5, 1318.52];
    let start = now;
    for (let i = 0; i < 9; i++) {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = freqs[i % freqs.length];
      osc.connect(gainNode);
      osc.start(start);
      osc.stop(start + 0.3);
      start += 0.3;
    }
    gainNode.gain.exponentialRampToValueAtTime(0.00001, start);
  } catch(e) { console.warn('Erro no alarme:', e); }
}
